name: Python executable build

on:
  workflow_dispatch:
  push:
    paths:
      - "preprocessing/**"
      - ".github/workflows/python-exe-build.yml"
  pull_request:
    paths:
      - "preprocessing/**"
      - ".github/workflows/python-exe-build.yml"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: preprocessing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pyinstaller

      - name: Build executable
        run: python packaging/pyinstaller/generate_exe.py

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: artemis-preprocessing-executable
          path: preprocessing/dist/artemis_preprocessing.exe
          if-no-files-found: error
